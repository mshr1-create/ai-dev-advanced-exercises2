<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News App</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
</head>
<body>
  <div id="app">
    <h1 class="title">最新ニュース一覧</h1>
    <section class="category-selector">
      <p>カテゴリを選択：</p>
      <select v-model="selectedCategory" @change="filterArticles" id="category-select">
        <option value="">--すべて表示--</option>
        <option value="政治">政治</option>
        <option value="経済">経済</option>
        <option value="IT">IT</option>
        <option value="スポーツ">スポーツ</option>
        <option value="社会">社会</option>
        <option value="企業">企業</option>
        <option value="エンタメ">エンタメ</option>
        <option value="ビジネス">ビジネス</option>
        <option value="AI">AI</option>
        <option value="健康">健康</option>
      </select>
    </section>
    <section class="articles">
    <ul class="article">
      <li class="article-item" v-for="article in articles" :key="article.id">
        <h2 class="article-title">
            <a :href="article.link" target="_blank">{{ article.title }}</a>
        </h2>
        <p class="article-description">{{ article.description }}</p>
        <ul class="article-tags">
          <li class="article-tag" v-for="tag in article.tags" :key="tag.id">{{ tag }}</li>
        </ul>
      </li>
    </ul>
    </section>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        articles: [],
        allArticles: [],
        selectedCategory: '',
        // 細分類タグを緩いカテゴリへマッピング
        tagCategoryMap: {
          '情報セキュリティ': 'IT',
          'サイバーセキュリティ': 'IT',
          'クラウド': 'IT',
          'AI': 'IT',
          '障害': 'IT',
          'ソフトウェア': 'IT',
          '写真': 'IT',
          'ランキング': '社会',
          '調査': '社会',
          '心理': '社会',
          'メディア': '社会',
          '働き方': '社会',
          '出版': '社会',
          '企業': '企業',
          '経済': '経済',
          '政治': '政治',
          'スポーツ': 'スポーツ',
          'サッカー': 'スポーツ',
          'Jリーグ': 'スポーツ',
          '野球': 'スポーツ',
          'プロ野球': 'スポーツ',
          'バレーボール': 'スポーツ',
          '格闘技': 'スポーツ'
        }
      },
      mounted() {
        fetch('all_topics.json')
          .then(response => response.json())
          .then(data => {
            this.allArticles = data;
            this.articles = data;
          })
          .catch(error => {
            console.error('Error:', error);
          });
      },
      methods: {
        filterArticles() {
          if (this.selectedCategory === '') {
            this.articles = this.allArticles;
            return;
          }
          const category = this.selectedCategory;
          const map = this.tagCategoryMap;
          this.articles = this.allArticles.filter(article => {
            if (!article.tags || article.tags.length === 0) return false;
            // タグが直接カテゴリと一致する、またはマップでカテゴリに束ねられる場合に一致
            return article.tags.some(tag => {
              if (tag === category) return true;
              const coarse = map[tag];
              return coarse === category;
            });
          });
        }
      }
    });
  </script>
</body>
</html>
